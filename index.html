<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Stats preview card component</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <article class="stats-card">
      
      <div class="card-image">
        <img src="./images/image-header-mobile.jpg" alt="People working in an office">
      </div>

      <div class="card-content">
        <header>
          <h1>Get <span class="accent">insights</span> that help your business grow.</h1>
          <p class="description">
            Discover the benefits of data analytics and make better decisions 
            regarding revenue, customer experience, and overall efficiency.
          </p>
        </header>

        <ul class="stats-list">
          <li>
            <strong class="stat-value">10k+</strong>
            <span class="stat-label">companies</span>
          </li>
          <li>
            <strong class="stat-value">314</strong>
            <span class="stat-label">templates</span>
          </li>
          <li>
            <strong class="stat-value">12m+</strong>
            <span class="stat-label">queries</span>
          </li>
        </ul>
      </div>

    </article>
  </main>
</body>
</html>
